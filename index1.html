<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA HAMA</title>
    <style>
        div {
            font-family: Arial, Helvetica, sans-serif;
            font-display: block;
        }
        .container{
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card{
            transition: transform 0,3 ease;
            background-color: rgb(217, 255, 0);
            border: 7px solid orange;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            max-width: 300px;
            box-shadow: 6px 10px 2px rgb(0,0,0,0.1);
        }
        .card:hover{
            transform: translateY(-10px);
            background-color: rgb(180, 117, 0);
        }
        .btn-detail {
            background-color: aqua;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            background-color: rgb(0, 255, 255);
            transform: scale(1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h3 class="judul-utama">Hama Kucing</h3>
            <p>Umur: 25 tahum</p>
            <button class="btn-detail">Lihat Detail</button>
        </div>
        <div class="card">
            <h3 class="judul-hama">Hama Manusia</h3>
            <p>Umur: 50 tahun</p>
            <button type="submit" class="btn-detail">Lihat Detail</button>
        </div>
    </div>
</body>

</html>
