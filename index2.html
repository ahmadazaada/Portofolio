<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(90deg, hsla(202, 71%, 27%, 1) 0%, hsla(176, 45%, 66%, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Bikin konten tepat di tengah layar */
            margin: 0;
        }

        .container {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            background-color: #27496c;
            border-radius: 20px;
            text-align: center;
            padding: 30px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card {
            background-color: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 10px solid orange;
        }

        .card h3 {
            font-size: 30px;
            padding: 10px;
            margin-top: 0;
            color: orange;
            background-color: #2c3e50;
        }

        .btn {
            padding: 10px 20px;
            font-family: Arial, sans-serif;
            background-color: white;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s; /* Biar smooth pas berubah warna */
            margin: 5px;
        }

        .btn:hover {
            background-color: black;
            color: white;
            transform: scale(1.1); /* Efek membesar dikit */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3 class="h3">Biodata</h3>
            <p>Nama: Ahmada Zaada</p>
            <p>Umur: 18 Tahun</p>
            <p>Kelas: XII C2</p>
            <p>Link Portofolio</p>
        </div>
        <div>
 <a href="https://github.com/">
        <button type="submit" class="btn">Github</button>
        </a>
        <a href="https://www.instagram.com/">
        <button type="submit" class="btn">Instagram</button>
        </a>
        </div>
    </div>
</body>
</html>
