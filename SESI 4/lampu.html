<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <!-- Link ke Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <header class="bg-gray-900 text-white">
    <nav class="max-w-screen-xl mx-auto px-4 py-4 flex justify-between items-center">
      <!-- Logo atau Brand -->
      <div class="text-2xl font-bold bg-gray-800 transition-all">
        <a href="#">My Website</a>
      </div>
  
      <!-- Toggler untuk mobile (hamburger menu) -->
      <div class="lg:hidden">
        <button id="hamburger" class="text-white focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
  
      <!-- Menu -->
      <div class="hidden lg:flex space-x-8">
        <a href="#" class="text-lg hover:text-blue-500">Home</a>
        <a href="#" class="text-lg hover:text-blue-500">About</a>
        <a href="#" class="text-lg hover:text-blue-500">Services</a>
        <a href="#" class="text-lg hover:text-blue-500">Contact</a>
      </div>
    </nav>
  
    <!-- Mobile Menu (Hidden by default) -->
    <div id="mobile-menu" class="lg:hidden hidden bg-gray-800 text-white bg">
      <div class="px-4 py-2">
        <a href="#" class="block text-lg py-2 hover:text-blue-500">Home</a>
        <a href="#" class="block text-lg py-2 hover:text-blue-500">About</a>
        <a href="#" class="block text-lg py-2 hover:text-blue-500">Services</a>
        <a href="#" class="block text-lg py-2 hover:text-blue-500">Contact</a>
      </div>
    </div>
  </header>
  
  <!-- Script untuk Toggle Menu pada Mobile -->
  <script>
    const hamburger = document.getElementById("hamburger");
    const mobileMenu = document.getElementById("mobile-menu");
  
    hamburger.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });
  </script>
  
</head>
<body>
  <!-- Tempatkan kode section di sini -->
  <section class="bg-gray-900 text-white text-center">
    <div class="mx-auto max-w-screen-xl px-4 py-32 lg:flex lg:h-screen lg:items-center text-center">
      <div class="mx-auto max-w-3xl text-center">
        <h1
          class="bg-gradient-to-r from-green-300 via-blue-500 to-purple-600 bg-clip-text text-3xl font-extrabold text-transparent sm:text-5xl"
        >
          Understand User Flow.
          <span class="sm:block"> Increase Conversion. </span>
        </h1>
        <p class="mx-auto mt-4 max-w-xl sm:text-xl/relaxed">
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nesciunt illo tenetur fuga ducimus
          numquam ea!
        </p>
        <div class="mt-8 flex flex-wrap justify-center gap-4">
          <a
            class="block w-full rounded border border-blue-600 bg-blue-600 px-12 py-3 text-sm font-medium text-white hover:bg-transparent hover:text-white focus:outline-none focus:ring active:text-opacity-75 sm:w-auto"
            href="#"
          >
            Get Started
          </a>
          <a
            class="block w-full rounded border border-blue-600 px-12 py-3 text-sm font-medium text-white hover:bg-blue-600 focus:outline-none focus:ring active:bg-blue-500 sm:w-auto"
            href="#"
          >
            Learn More
          </a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
