<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
nav {
    position: sticky;
    top: 0;
    z-index: 1000; /* Biar dia selalu di paling depan */
    display: flex;
    justify-content: flex-end; /* Tombol geser ke kanan */
    gap: 10px;
}
        
        .grid-wadah{
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            display: grid;
            gap: 10px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold
        }
        .kotak{
            background-color:#12007b;
            padding: 10px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 25px;
            font-family: Poppins;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 20px;
            padding: 10px;
        }
        .kotak img{
            width: 100%;
            height: 200px;
            border-radius: 8px;
            transition: transform 0.5 ease;

        }
        .kotak:hover img{
            transform: scale(1.1) rotate(2deg);
        }
        .kotak p{
            font-size: 18px;
            margin-top: 10px;
            color: #ffffff;
            justify-content: center;
        }
        .kotak:hover{
            transform: scale(1.1);
            transition: 0.3s;
        }
        footer{
            font-family: Poppins;
            text-align: center;
            padding: 20px;
        }
        .hero{
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('https://picsum.photos/1200/400?nature');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            font-family: Poppins;
            margin-bottom: 30px
        }
        .hero h1{
            font-weight:  bold;
            font-size: 40px;
            margin-bottom: 10px;
        }
        .btn-info{
            background-color: #006aff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-family: Poppins;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            font-size: small;
            width: 100%;
            box-shadow: none;
        }
        .btn-info:hover{
            background-color: #5282c58b;
        }
        .btn-info:active {
            transform: translateY(3px);
            box-shadow: none;
        }
    </style>
    <div class="modal fade" id="modalDaftar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Form Pendaftaran</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" class="form-control mb-2" placeholder="Nama Lengkap">
        <input type="email" class="form-control" placeholder="Email Anda">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary">Kirim Data</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
        <nav class="">
        <button  type="button" class="btn btn-primary">Masuk</button>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalDaftar">Daftar</button>
    </nav>
    <div class="hero">
        <h1>Selamat Datang di Galeri Hama</h1>
        <p>Temukan informasi lengkap mengenai berbagai jenis hama di sini</p>
    </div>
    <div class="grid-wadah">
        <div class="kotak">
            <img src="https://picsum.photos/200/300?random=1" alt="Gambar Hama">
            <p>Hama Tikus</p>
            <button class="btn-info">Selengkapnya</button>
        </div>
        <div class="kotak">
            <img src="https://picsum.photos/200/300?random=2" alt="Gambar Hama">
            <p>Hama Padi</p>
            <button class="btn-info">Selengkapnya</button>
        </div>
        <div class="kotak">
            <img src="https://picsum.photos/200/300?random=3" alt="Gambar Hama">
            <p>Hama Kucing</p>
            <button class="btn-info">Selengkapnya</button>
        </div>
        <div class="kotak">
            <img src="https://picsum.photos/200/300?random=4" alt="Gambar Hama">
            <p>Hama Sapi</p>
            <button class="btn-info">Selengkapnya</button>
        </div>
        <div class="kotak">
            <img src="https://picsum.photos/200/300?random=5" alt="Gambar Hama">
            <p>Hama Tengu</p>
            <button class="btn-info">Selengkapnya</button>
        </div>
    </div>
    <footer>
        &copy; 2024 Galeri Ahmada
    </footer>
</body>
</html>
